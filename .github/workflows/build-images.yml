name: Build and Push Images

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - 'v*'
  pull_request: { }
  workflow_dispatch: { }

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_QUEUE: ${{ github.repository_owner }}/koord-queue
  IMAGE_NAME_CONTROLLERS: ${{ github.repository_owner }}/koord-queue-controllers

jobs:
  build-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for koord-queue
        id: meta-queue
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_QUEUE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push koord-queue
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-queue.outputs.tags }}
          labels: ${{ steps.meta-queue.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-controllers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for koord-queue-controllers
        id: meta-controllers
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CONTROLLERS }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push koord-queue-controllers
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.controllers
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-controllers.outputs.tags }}
          labels: ${{ steps.meta-controllers.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
