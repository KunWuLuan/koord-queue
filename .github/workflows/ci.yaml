name: CI

on:
  push:
    branches:
    - main
    - release-*
  pull_request: {}
  workflow_dispatch: {}

jobs:
  golangci-lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        cache: false
        go-version-file: go.mod
    - uses: golangci/golangci-lint-action@v7
      with:
        version: latest

  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        cache: false
        go-version-file: go.mod
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-ut-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-ut-
    - name: Run unit tests
      run: GOWORK=off go test -mod=mod ./pkg/controller/... ./pkg/queue/... ./pkg/controllers/... -count=1 -v

  build:
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        cache: false
        go-version-file: go.mod
    - name: Build
      run: GOWORK=off go build -o bin/koord-queue ./cmd

  integration-tests:
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        cache: false
        go-version-file: go.mod
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-integration-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-integration-
    - name: Run integration tests
      run: GOWORK=off go test -mod=mod ./pkg/test/integration/... -count=1 -v
