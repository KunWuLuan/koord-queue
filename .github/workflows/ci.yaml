name: CI

on:
  push:
    branches:
      - main
      - release-*
  pull_request: { }
  workflow_dispatch: { }

jobs:
  golangci-lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          cache: false
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          cache: false
          go-version-file: go.mod
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-ut-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-ut-
      - name: Run unit tests
        run: GOWORK=off go test -mod=mod ./pkg/controller/... ./pkg/queue/... ./pkg/controllers/... -count=1 -v

  build:
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          cache: false
          go-version-file: go.mod
      - name: Build
        run: GOWORK=off go build -o bin/koord-queue ./cmd

  integration-tests:
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          cache: false
          go-version-file: go.mod
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-integration-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-integration-
      - name: Run integration tests
        run: GOWORK=off go test -mod=mod ./pkg/test/integration/... -count=1 -v

  build-images:
    needs: [ unit-tests ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [ koord-queue, koord-queue-controllers ]
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64
          push: false
          pull: true
          file: ./Dockerfile${{ matrix.target == 'koord-queue-controllers' && '.controllers' || '' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.target }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at}}
            org.opencontainers.image.licenses=Apache-2.0
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha,scope=build-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.target }}
      - if: github.ref == 'refs/heads/main'
        name: Build and push the multi-arch images
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          file: ./Dockerfile${{ matrix.target == 'koord-queue-controllers' && '.controllers' || '' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.target }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at}}
            org.opencontainers.image.licenses=Apache-2.0
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.target }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha,scope=build-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.target }}
