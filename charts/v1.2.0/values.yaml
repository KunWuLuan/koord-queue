# Default values for koord-queue.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # the prefix of all image
  imagePrefix: registry-cn-beijing.ack.aliyuncs.com

tolerations: []
isNeedNotebookExtension: false
oversellrate: 1
qps: 50
burst: 50
jobRunningTimeout: "0"
jobBackoffTime: "0"

installation:
  namespace: koord-queue
  roleListGroups:
    - '*'

admissionCheckController:
  enabled: true
  image:
    repository: acs/prevreq-controller
    tag: v1.0.0-aliyun-d31082a1

controller:
  image:
    repository: acs/kube-queue
    tag: v1.3.0.b826c293
  # resources of koord-queue-controller container
  queueGroupPlugin: elasticquotav2
  enableBlockingMode: false
  enableStrictPriority: false
  enableVisibilityServer: false
  enableResourceCheckWithScheduler: false
  defaultPreemptible: true
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

extension:
  jobextensions:
    tag: v1.1.3-aliyun-13b87449
    resources:
      limits:
        memory: 2Gi
  ray:
    enable: false
  tf:
    enable: false
  pytorch:
    enable: false
  batchjob:
    enable: true
  argo:
    enable: false
  spark:
    enable: false
  mpi:
    enable: false

pluginConfigs: 
  apiVersion: scheduling.k8s.io/v1
  kind: KoordQueueConfiguration
  plugins: 
  - name: Priority
  - name: ElasticQuotaV2
  pluginConfigs: {}
#   ElasticQuota: 
#     checkHungryQuota: false