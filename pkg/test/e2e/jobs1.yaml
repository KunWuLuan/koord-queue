---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: test-group-high-prio
preemptionPolicy: Never
value: 3
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pi-1
  namespace: test-group
  labels:
    quota.scheduling.alibabacloud.com/name: "child-1"
  annotations:
    koord-queue/queue-name: test-queue
spec:
  suspend: true
  completions: 2
  parallelism: 2
  template:
    spec:
      priorityClassName: test-group-high-prio
      priority: 3
      schedulerName: ack-scheduler
      containers:
      - name: pi
        image: perl:5.34.0
        command: ["sleep",  "inf"]
        resources:
          requests:
            cpu: 1
          limits:
            cpu: 1
      restartPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pi-2
  namespace: test-group
  labels:
    quota.scheduling.alibabacloud.com/name: "child-1"
  annotations:
    koord-queue/queue-name: test-queue
spec:
  suspend: true
  completions: 1
  parallelism: 1
  template:
    spec:
      schedulerName: ack-scheduler
      containers:
      - name: pi
        image: perl:5.34.0
        command: ["sleep",  "inf"]
        resources:
          requests:
            cpu: 1
          limits:
            cpu: 1
      restartPolicy: Never