---
apiVersion: scheduling.sigs.k8s.io/v1beta1
kind: ElasticQuotaTree
metadata:
  name: elasticquotatree
  namespace: kube-system 
spec:
  root:
    name: root 
    max:
      cpu: 999900
      memory: 400000Gi
      koord-queue/max-jobs: 10000000000
      nvidia.com/gpu: 100000
    min:
      cpu: 9999
      memory: 40Gi
    children:
    - name: child-1
      max:
        koord-queue/max-jobs: 2
        cpu: 100
        memory: 100Gi