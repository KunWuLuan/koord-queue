    kube-queue/queue-name: intelligent-queue
spec:
  suspend: true
  completions: 2
  parallelism: 2
  template:
    spec:
      priorityClassName: low
      priority: 3
      schedulerName: default-scheduler
      containers:
      - name: pi
        image: perl:5.34.0
        command: ["sleep",  "10s"]
        resources:
          requests:
            cpu: 5
          limits:
            cpu: 5
      restartPolicy: Never
