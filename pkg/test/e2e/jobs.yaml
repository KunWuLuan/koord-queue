---
apiVersion: batch/v1
kind: Job
metadata:
  name: pi-1
  namespace: test-group
  labels:
    quota.scheduling.alibabacloud.com/name: "child-1"
  annotations:
    kube-queue/queue-name: test-queue
spec:
  suspend: true
  completions: 2
  parallelism: 2
  template:
    spec:
      schedulerName: ack-scheduler
      containers:
      - name: pi
        image: perl:5.34.0
        command: ["sleep",  "inf"]
        resources:
          requests:
            cpu: 1
          limits:
            cpu: 1
      restartPolicy: Never
---
